<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Demo</title>
</head>
<body>

<h1>Random integers in range</h1>

<div>
  <label for="min">Min:</label>
  <input id="min" name="min" type="number" />
</div>
<div>
  <label for="max">Max:</label>
  <input id="max" name="max" type="number" />
</div>

<button id="send">Get random integer</button>

<div id="container"></div>

<script>
let minInput = document.getElementById("min");
let maxInput = document.getElementById("max");
let button = document.getElementById("send");
let container = document.getElementById("container");

button.addEventListener("click", () => {
  const min = minInput.value;
  const max = maxInput.value;
  
  fetch(`/random?min=${min}&max=${max}`).then((response) => {
    return response.json();
  }).then((data) => {
    console.log("Received body:", data);
    const number = data.number;
    const numberElement = document.createElement("div");
    numberElement.textContent = number;
    
    if (number > 15) {
      numberElement.style.color = "blue";
    }
    
    container.appendChild(numberElement);
  }).catch(error => {
    console.log(error);
  });
});
</script>

</body>
</html>
